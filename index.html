  <!-- Styles -->
  <style>
/* ═══════════════════════════════════════════════
   FAMILY TREE — STYLE SYSTEM
   Aesthetic: Warm organic · heirloom · editorial
   ═══════════════════════════════════════════════ */

:root {
  /* Palette */
  --bg:            #f7f4ef;
  --bg-warm:       #f0ebe2;
  --bg-card:       #ffffff;
  --text:          #2c2419;
  --text-secondary:#6b6054;
  --text-muted:    #9a9184;
  --accent:        #b86e3a;
  --accent-hover:  #9c5a2c;
  --accent-light:  #f3e4d4;
  --maternal:      #7a9e7e;
  --maternal-light:#e4efe5;
  --paternal:      #5d7fa3;
  --paternal-light:#dce8f3;
  --border:        #e2dbd0;
  --border-light:  #ece7df;
  --shadow-sm:     0 1px 3px rgba(44,36,25,0.06);
  --shadow-md:     0 4px 16px rgba(44,36,25,0.08);
  --shadow-lg:     0 12px 40px rgba(44,36,25,0.12);
  --radius:        12px;
  --radius-sm:     8px;
  --radius-lg:     16px;

  /* Typography */
  --font-display:  'Cormorant Garamond', Georgia, serif;
  --font-body:     'Outfit', -apple-system, sans-serif;
  --font-mono:     'JetBrains Mono', monospace;

  /* Transitions */
  --ease:          cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-bounce:   cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ─── Reset ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* Subtle paper texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ═══ HEADER ═══ */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(247, 244, 239, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-light);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text);
  flex-shrink: 0;
}
.logo-icon {
  font-size: 24px;
  line-height: 1;
}
.logo-text {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

/* View Nav Tabs */
.view-nav {
  display: flex;
  gap: 4px;
  background: var(--bg-warm);
  border-radius: 10px;
  padding: 4px;
  margin: 0 auto;
}
.view-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  background: transparent;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.25s var(--ease);
  white-space: nowrap;
}
.view-tab:hover {
  color: var(--text-secondary);
  background: rgba(255,255,255,0.5);
}
.view-tab.active {
  color: var(--text);
  background: var(--bg-card);
  box-shadow: var(--shadow-sm);
}
.view-tab svg { opacity: 0.6; transition: opacity 0.2s; }
.view-tab.active svg { opacity: 1; }

/* Header Actions */
.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.search-wrapper {
  position: relative;
}
.search-input {
  width: 180px;
  padding: 8px 12px 8px 34px;
  border: 1.5px solid var(--border);
  border-radius: 100px;
  background: var(--bg-card);
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: all 0.25s var(--ease);
}
.search-input:focus {
  width: 240px;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.search-input::placeholder { color: var(--text-muted); }
.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}

.search-results {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  right: 0;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  max-height: 280px;
  overflow-y: auto;
  z-index: 200;
}
.search-results.open { display: block; }
.search-result-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  transition: background 0.15s;
  border-bottom: 1px solid var(--border-light);
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--accent-light); }
.search-result-item .sr-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--bg-warm);
}
.search-result-item .sr-name { font-weight: 500; font-size: 14px; }
.search-result-item .sr-relation { font-size: 12px; color: var(--text-muted); }

.admin-link {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--bg-warm);
  text-decoration: none;
  font-size: 16px;
  transition: all 0.2s;
}
.admin-link:hover {
  background: var(--accent-light);
  transform: rotate(90deg);
}

/* ═══ MAIN CONTENT ═══ */
.main-content {
  flex: 1;
  position: relative;
  z-index: 1;
}

.view-container {
  display: none;
  min-height: calc(100vh - 140px);
  padding: 24px;
}
.view-container.active {
  display: block;
  animation: viewFadeIn 0.4s var(--ease) both;
}
.view-container.exiting {
  display: block;
  animation: viewFadeOut 0.2s var(--ease) both;
}

@keyframes viewFadeIn {
  from { opacity: 0; transform: translateY(12px) scale(0.99); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes viewFadeOut {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-8px); }
}

/* Cross-view highlighting */
.person-card.highlighted {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 3px var(--accent-light), var(--shadow-md) !important;
  animation: highlightPulse 1.5s ease-in-out;
}
.tree-node.highlighted circle {
  stroke-width: 4px !important;
  filter: drop-shadow(0 0 8px rgba(184,110,58,0.5)) !important;
}
.tree-node.highlighted text { font-weight: 700 !important; }
@keyframes highlightPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

/* Share toast */
.share-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: var(--bg);
  padding: 12px 24px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 500;
  z-index: 999;
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}
.share-toast.show { transform: translateX(-50%) translateY(0); }

/* Timeline decade expand */
.decade-section { margin-bottom: 4px; }
.decade-header {
  position: relative;
  padding: 16px 0 8px 56px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.5px;
  cursor: pointer;
  user-select: none;
  transition: color 0.2s;
}
.decade-header:hover { color: var(--accent-hover); }
.decade-header .decade-toggle {
  display: inline-block;
  margin-left: 6px;
  font-size: 10px;
  transition: transform 0.3s;
  color: var(--text-muted);
}
.decade-section.collapsed .decade-toggle { transform: rotate(-90deg); }
.decade-section.collapsed .decade-events { display: none; }
.decade-snapshot {
  display: none;
  padding: 4px 0 8px 56px;
}
.decade-section.collapsed .decade-snapshot { display: flex; gap: 6px; flex-wrap: wrap; }
.decade-snap-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 500;
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}
.decade-snap-chip:hover { border-color: var(--accent); color: var(--accent); }

/* ─── Loading Skeletons ─── */
.view-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px;
}
.loading-text {
  font-family: var(--font-display);
  font-size: 16px;
  color: var(--text-muted);
  font-style: italic;
  margin-top: 24px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* Tree skeleton */
.skeleton-tree { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.skel-node {
  width: 80px; height: 28px;
  border-radius: 8px;
  background: var(--border-light);
  animation: shimmer 1.8s infinite;
}
.skel-node.root { width: 100px; background: var(--accent-light); }
.skel-node.sm { width: 60px; height: 24px; }
.skel-line { width: 2px; height: 16px; background: var(--border-light); }
.skel-row { display: flex; gap: 16px; }

/* Radial skeleton */
.skeleton-radial { position: relative; width: 200px; height: 200px; }
.skel-ring {
  position: absolute;
  border-radius: 50%;
  border: 2px dashed var(--border-light);
  animation: shimmer 2s infinite;
}
.skel-ring.r1 { width: 80px; height: 80px; top: 60px; left: 60px; }
.skel-ring.r2 { width: 140px; height: 140px; top: 30px; left: 30px; }
.skel-ring.r3 { width: 200px; height: 200px; top: 0; left: 0; }
.skel-center {
  position: absolute;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--accent-light);
  top: 80px; left: 80px;
  animation: shimmer 1.8s infinite;
}

@keyframes shimmer {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

/* ─── Tree View ─── */
#tree-canvas {
  width: 100%;
  min-height: calc(100vh - 160px);
}
#tree-canvas svg {
  width: 100%;
  height: 100%;
}

/* D3 tree nodes */
.tree-node circle {
  fill: var(--bg-card);
  stroke: var(--accent);
  stroke-width: 2px;
  cursor: pointer;
  transition: all 0.25s var(--ease);
}
.tree-node:hover circle {
  fill: var(--accent-light);
  stroke-width: 3px;
  filter: drop-shadow(0 2px 12px rgba(184,110,58,0.35));
}
.tree-node:hover { transform: scale(1.08); }
.tree-node text {
  font-family: var(--font-body);
  font-size: 12px;
  fill: var(--text);
  pointer-events: none;
  transition: fill 0.2s;
}
.tree-node:hover text { fill: var(--accent); }
.tree-node image {
  cursor: pointer;
  transition: filter 0.2s;
}
.tree-node:hover image { filter: brightness(1.1); }
.tree-node .node-photo {
  cursor: pointer;
}
.tree-link {
  fill: none;
  stroke: var(--border);
  stroke-width: 1.5px;
  transition: stroke 0.3s;
}
.tree-node.maternal circle { stroke: var(--maternal); }
.tree-node.paternal circle { stroke: var(--paternal); }

/* Sibling nodes in tree — slightly smaller and faded */
.sibling-node:hover { opacity: 1 !important; }
.sibling-node circle { stroke-dasharray: 3 2; }

/* Card stagger animation */
.person-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s var(--ease);
  animation: cardIn 0.45s var(--ease-bounce) both;
}
.person-card:nth-child(1) { animation-delay: 0s; }
.person-card:nth-child(2) { animation-delay: 0.04s; }
.person-card:nth-child(3) { animation-delay: 0.08s; }
.person-card:nth-child(4) { animation-delay: 0.12s; }
.person-card:nth-child(5) { animation-delay: 0.16s; }
.person-card:nth-child(6) { animation-delay: 0.2s; }
.person-card:nth-child(n+7) { animation-delay: 0.24s; }
.person-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-md);
  transform: translateY(-4px);
}
.person-card:hover .card-photo {
  border-color: var(--accent-light);
  transform: scale(1.05);
}

/* Card photo transition */
.person-card .card-photo {
  width: 72px; height: 72px;
  border-radius: 50%;
  object-fit: cover;
  margin: 0 auto 12px;
  border: 3px solid var(--bg-warm);
  background: var(--bg-warm);
  transition: all 0.3s var(--ease);
}

/* Error / empty state */
.view-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px;
  text-align: center;
}
.view-empty .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.view-empty .empty-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 6px;
}
.view-empty .empty-text {
  font-size: 14px;
  color: var(--text-muted);
  max-width: 360px;
}

/* ─── Radial View ─── */
#radial-canvas {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 160px);
}

.radial-arc {
  cursor: pointer;
  transition: opacity 0.2s;
}
.radial-arc:hover { opacity: 0.85; }

/* ─── Cards View ─── */
.cards-toolbar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  padding: 0 4px;
}
.filter-group {
  display: flex;
  gap: 4px;
  background: var(--bg-warm);
  border-radius: 8px;
  padding: 3px;
}
.filter-btn {
  padding: 6px 14px;
  border: none;
  border-radius: 6px;
  background: transparent;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s var(--ease);
}
.filter-btn:hover { color: var(--text-secondary); }
.filter-btn.active {
  background: var(--bg-card);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.person-card .card-name {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 2px;
}
.person-card .card-relation {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.person-card .card-tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 500;
}
.person-card .card-tag.maternal { background: var(--maternal-light); color: var(--maternal); }
.person-card .card-tag.paternal { background: var(--paternal-light); color: var(--paternal); }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ─── Timeline View ─── */
.timeline-canvas {
  position: relative;
  padding: 40px 0;
  min-height: calc(100vh - 160px);
}
.timeline-axis {
  position: relative;
  width: 4px;
  background: linear-gradient(180deg, var(--accent), var(--maternal));
  margin: 0 auto;
  border-radius: 2px;
}
.timeline-event {
  position: absolute;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: transform 0.2s var(--ease);
}
.timeline-event:hover { transform: scale(1.03); }
.timeline-event.left { flex-direction: row-reverse; right: calc(50% + 20px); }
.timeline-event.right { left: calc(50% + 20px); }
.timeline-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 3px solid var(--bg);
  flex-shrink: 0;
}
.timeline-dot.birth { background: var(--accent); }
.timeline-dot.marriage { background: var(--maternal); }
.timeline-dot.death { background: var(--text-muted); }
.timeline-card {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  max-width: 260px;
  box-shadow: var(--shadow-sm);
}
.timeline-card .tc-year {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
  font-weight: 500;
}
.timeline-card .tc-name {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
}
.timeline-card .tc-event {
  font-size: 13px;
  color: var(--text-muted);
}

/* ═══ PERSON MODAL ═══ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(44,36,25,0.5);
  backdrop-filter: blur(4px);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-overlay.open {
  display: flex;
  animation: modalBgIn 0.3s var(--ease);
}
@keyframes modalBgIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal-content {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 36px;
  max-width: 440px;
  width: 100%;
  position: relative;
  box-shadow: var(--shadow-lg);
  animation: modalSlideIn 0.35s var(--ease-bounce);
  text-align: center;
}
@keyframes modalSlideIn {
  from { opacity: 0; transform: translateY(24px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  width: 32px; height: 32px;
  border: none;
  border-radius: 50%;
  background: var(--bg-warm);
  font-size: 20px;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.modal-close:hover { background: var(--accent-light); color: var(--accent); }

.modal-photo-wrap {
  width: 120px; height: 120px;
  border-radius: 50%;
  margin: 0 auto 16px;
  overflow: hidden;
  border: 4px solid var(--bg-warm);
  background: var(--bg-warm);
}
.modal-photo {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.modal-name {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 2px;
}
.modal-relation {
  font-size: 14px;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 20px;
}

.modal-details {
  text-align: left;
}
.modal-detail {
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);

(function () {
  'use strict';

  // ─── Config ───
  const SHEETS_CONFIG = {
    apiKey: 'AIzaSyBVnfX5ld_hrU9FWL9F8Pe68jf4ZjyrA3U',
    sheetId: '1hqwlHomJrpSjRpof0dux_4ojRshpHD50s6b33P61Qmc',

  // ─── State ───
  let familyData = null;
  let currentView = 'tree';
  let allMembers = [];

  // ─── DOM References ───
  const viewTabs = document.querySelectorAll('.view-tab');
  const viewContainers = document.querySelectorAll('.view-container');
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');

  // ═══ INIT ═══
  async function init() {
    setupViewSwitching();

    setupDarkMode();
    setupStats();
    setupPrint();
    await loadData();
  }

  // ═══ DATA LOADING — Google Sheets API ═══
  async function loadData() {
    try {
      // Try Google Sheets API first (live data)
      const members = await fetchFromGoogleSheets();
      if (members && members.length > 0) {
        console.log(`Loaded ${members.length} members from Google Sheets`);
        allMembers = members;
        familyData = {
          members: allMembers,
          root: buildTreeFromFlat(allMembers),
          events: buildEventsFromMembers(allMembers)
        };
        populateHero();
        renderCurrentView();
        return;
      }
    } catch (err) {
      console.warn('Google Sheets fetch failed, trying local JSON...', err.message);
    }

    // Fallback to local family.json
    try {
      const response = await fetch('./data/family.json');
      if (!response.ok) throw new Error('No data file found');
      const data = await response.json();
      allMembers = data.members || [];
      familyData = {
        members: allMembers,
        root: buildTreeFromFlat(allMembers),
        events: data.events || buildEventsFromMembers(allMembers)
      };
      console.log(`Loaded ${allMembers.length} members from local JSON`);
      populateHero();
      renderCurrentView();
    } catch (err) {
      console.log('No local data either — showing error state.', err.message);
      showErrorState();
    }
  }

  function showErrorState() {
    // Hide all loading skeletons
    document.querySelectorAll('.view-loading').forEach(el => el.style.display = 'none');
    // Show error in tree view
    const container = document.getElementById('tree-canvas');
    container.innerHTML = `
      <div class="view-empty">
        <div class="empty-icon">🌱</div>
        <div class="empty-title">No family data yet</div>
        <div class="empty-text">Add family members to your Google Sheet, or use the <a href="admin.html" style="color:var(--accent);">admin panel</a> to get started.</div>
      </div>
    `;
  }

  async function fetchFromGoogleSheets() {
    const { apiKey, sheetId, sheetName } = SHEETS_CONFIG;
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(sheetName)}?key=${apiKey}`;

    const response = await fetch(url);
    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      throw new Error(errData.error?.message || `Sheets API returned ${response.status}`);
    }

    const data = await response.json();
    const rows = data.values;
    if (!rows || rows.length < 2) return [];

    // First row = headers, remaining rows = data
    const headers = rows[0].map(h => h.trim().toLowerCase().replace(/\s+/g, '_'));
    const members = [];

    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (!row || row.length === 0) continue;

      // Build object from headers + row values
      const obj = {};
      headers.forEach((header, idx) => {
        obj[header] = (row[idx] || '').trim();
      });

      // Skip rows without a name
      if (!obj.name) continue;

      // Parse into our member format
      members.push({
        id: parseInt(obj.id) || i,
        name: obj.name || '',
        relation: (obj.relation || '').toLowerCase(),
        side: (obj.side || '').toLowerCase(),
        generation: parseInt(obj.generation) || 0,
        parent_id: obj.parent_id ? parseInt(obj.parent_id) : null,
        spouse_id: obj.spouse_id ? parseInt(obj.spouse_id) : null,
        born: obj.born || '',
        died: obj.died || '',
        birthplace: obj.birthplace || '',
        bio: obj.bio || '',
        fun_fact: obj.fun_fact || '',
        photo: obj.photo || '',
      });
    }

    return members;
  }

      { id: 5, name: 'Grandpa (Maternal)', relation: 'grandfather', side: 'maternal', generation: 2, parent_id: null, spouse_id: 4, born: '1960', died: '', birthplace: '', bio: '', fun_fact: '', photo: '' },
      { id: 6, name: 'Grandma (Paternal)', relation: 'grandmother', side: 'paternal', generation: 2, parent_id: null, spouse_id: 7, born: '1965', died: '', birthplace: '', bio: '', fun_fact: '', photo: '' },
      { id: 7, name: 'Grandpa (Paternal)', relation: 'grandfather', side: 'paternal', generation: 2, parent_id: null, spouse_id: 6, born: '1963', died: '', birthplace: '', bio: '', fun_fact: '', photo: '' },
    ];

    familyData = {
      members: allMembers,
      root: buildTreeFromFlat(allMembers),
      events: buildEventsFromMembers(allMembers)
    };
  }

  // ─── Build nested tree from flat member list ───
  // This builds an ancestor tree with siblings at each level
  // ─── Build ancestor tree (for radial view) ───
  function buildTreeFromFlat(members) {
    const root = members.find(m => m.generation === 0) || members[0];
    if (!root) return null;
    const visited = new Set();
    function attachParents(person) {
      if (visited.has(person.id)) return { ...person, parents: [] };
      visited.add(person.id);
      const node = { ...person, parents: [] };
      const directParent = members.find(m => m.id === person.parent_id);
      if (directParent) {
        node.parents.push(attachParents(directParent));
        const spouse = members.find(m => m.id === directParent.spouse_id);
        if (spouse && !visited.has(spouse.id)) {
          node.parents.push(attachParents(spouse));
        }
      }
      return node;
    }
    return attachParents(root);
  }

  // ─── Build top-down family tree (couples → children) for tree view ───
  function buildDescendantTree(members) {
    // Find the oldest generation couples and build downward
    const maxGen = Math.max(...members.map(m => m.generation));

    // Build a couple-based structure: each couple has children
    // A "family unit" is a parent + spouse who share children
    function getChildren(parentId, spouseId) {
      return members.filter(m => {
        if (m.parent_id === parentId) return true;
        if (spouseId && m.parent_id === spouseId) return true;
        return false;
      });
    }

    // Start from the root person (Ava) and build the full tree top-down
    // We need to find the topmost ancestors and work down
    // Strategy: build a map of parent_id → children, then create a hierarchy

    // Find people who have no parent_id (top of tree) — these are the oldest
    const topAncestors = members.filter(m => !m.parent_id);

    // Group top ancestors into couples
    const couples = [];
    const usedIds = new Set();

    topAncestors.forEach(person => {
      if (usedIds.has(person.id)) return;
      usedIds.add(person.id);
      const couple = { parents: [person], children: [] };
      if (person.spouse_id) {
        const spouse = members.find(m => m.id === person.spouse_id);
        if (spouse) {
          couple.parents.push(spouse);
          usedIds.add(spouse.id);
        }
      }
      // Find their children
      couple.children = members.filter(m =>
        couple.parents.some(p => m.parent_id === p.id)
      );
      couples.push(couple);
    });

    // Build recursive hierarchy: each node is a person, children are their actual children
    const visited = new Set();

    function buildNode(person) {
      if (visited.has(person.id)) return null;
      visited.add(person.id);

      const node = { ...person, children: [] };

      // Find this person's children (people whose parent_id = this person's id)
      let kids = members.filter(m => m.parent_id === person.id);

      // Also include children of spouse if spouse's id is someone's parent_id
      if (person.spouse_id) {
        const spouseKids = members.filter(m => m.parent_id === person.spouse_id && !kids.find(k => k.id === m.id));
        kids = [...kids, ...spouseKids];
      }

      // Remove duplicates
      const seen = new Set();
      kids = kids.filter(k => {
        if (seen.has(k.id)) return false;
        seen.add(k.id);
        return true;
      });

      kids.forEach(kid => {
        const childNode = buildNode(kid);
        if (childNode) node.children.push(childNode);
      });

      return node;
    }

    // Find the absolute root couples (great-grandparents on each side)
    // Build a virtual root that has both sides as children
    const roots = [];
    couples.forEach(couple => {
      const mainParent = couple.parents[0];
      const node = buildNode(mainParent);
      if (node) roots.push(node);
    });

    // If we have multiple root couples, create a virtual root
    if (roots.length === 0) return null;
    if (roots.length === 1) return roots[0];

    return {
      id: 0, name: 'Family', relation: 'root', side: '', generation: -1,
      photo: '', born: '', died: '', birthplace: '', bio: '', fun_fact: '',
      children: roots,
      _isVirtualRoot: true
    };
  }

    function buildEventsFromMembers(members) {
    const events = [];
    members.forEach(m => {
      if (m.born) {
        const year = extractYear(m.born);
        if (year) events.push({ year, type: 'birth', person: m.name, personId: m.id });
      }
      if (m.died) {
        const year = extractYear(m.died);
        if (year) events.push({ year, type: 'death', person: m.name, personId: m.id });
      }
    });
    return events.sort((a, b) => a.year - b.year);
  }

  // Extract a 4-digit year from various date formats
  function extractYear(dateStr) {
    if (!dateStr) return null;
    const s = String(dateStr).trim();
    // Try pure number first
    if (/^\d{4}$/.test(s)) return parseInt(s);
    // Look for 4-digit year anywhere in the string
    const match = s.match(/\b(1[0-9]{3}|20[0-9]{2})\b/);
    if (match) return parseInt(match[1]);
    // Try parsing as a date
    const d = new Date(s);
    if (!isNaN(d.getTime())) return d.getFullYear();
    return null;
  }

  // ═══ VIEW SWITCHING ═══
  function setupViewSwitching() {
    viewTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const view = tab.dataset.view;
        switchView(view);
        window.location.hash = '#/' + view;
      });
    });
  }

  function switchView(view) {
    if (view === currentView) return;

    const oldContainer = document.getElementById('view-' + currentView);
    const newContainer = document.getElementById('view-' + view);

    // Animate old view out
    if (oldContainer && oldContainer.classList.contains('active')) {
      oldContainer.classList.remove('active');
      oldContainer.classList.add('exiting');
      setTimeout(() => oldContainer.classList.remove('exiting'), 200);
    }

    currentView = view;

    viewTabs.forEach(t => {
      t.classList.toggle('active', t.dataset.view === view);
      t.setAttribute('aria-selected', t.dataset.view === view);
    });

    // Animate new view in after short delay
    setTimeout(() => {
      viewContainers.forEach(c => {
        if (c.id !== 'view-' + view) c.classList.remove('active');
      });
      newContainer.classList.add('active');
      renderCurrentView();
    }, 180);
  }

  function renderCurrentView() {
    switch (currentView) {
      case 'tree':    renderTree(); break;
      case 'radial':  renderRadial(); break;
      case 'cards':   renderCards(); break;
      case 'timeline': renderTimeline(); break;
    }
  }

  // ═══ URL ROUTING ═══
  function setupURLRouting() {
    handleRoute();
    window.addEventListener('hashchange', handleRoute);
  }

  function handleRoute() {
    const hash = window.location.hash.replace('#/', '');

    // Check for person deep link: #/person/3
    const personMatch = hash.match(/^person\/(\d+)$/);
    if (personMatch) {
      const personId = parseInt(personMatch[1]);
      // Wait for data to load, then show person
      const tryShow = () => {
        const person = allMembers.find(m => m.id === personId);
        if (person) {
          openPersonModal(person);
          highlightPerson(personId);
        }
      };
      if (allMembers.length) tryShow();
      else setTimeout(tryShow, 1000);
      return;
    }

    // View routing
    if (['tree', 'radial', 'cards', 'timeline'].includes(hash)) {
      if (currentView !== hash) switchView(hash);
    }
  }

  // ═══ CROSS-VIEW HIGHLIGHTING ═══
  let highlightedPersonId = null;

  function highlightPerson(personId) {
    highlightedPersonId = personId;

    // Highlight in cards view
    document.querySelectorAll('.person-card').forEach(card => {
      card.classList.remove('highlighted');
    });
    const cards = document.querySelectorAll('.person-card');
    cards.forEach(card => {
      // Find matching card by checking inner text
      const person = allMembers.find(m => m.id === personId);
      if (person && card.querySelector('.card-name')?.textContent === person.name) {
        card.classList.add('highlighted');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });

    // Highlight in tree view
    document.querySelectorAll('.tree-node').forEach(node => {
      node.classList.remove('highlighted');
    });
    const treeNodes = document.querySelectorAll('.tree-node');
    treeNodes.forEach(node => {
      const d = d3.select(node).datum();
      if (d && d.data && d.data.id === personId) {
        node.classList.add('highlighted');
      }
    });

    // Clear highlight after 3 seconds
    setTimeout(() => {
      document.querySelectorAll('.highlighted').forEach(el => el.classList.remove('highlighted'));
      highlightedPersonId = null;
    }, 3000);
  }

  // ═══ SHARE PERSON LINK ═══
  function sharePersonLink(person) {
    const url = window.location.origin + window.location.pathname + '#/person/' + person.id;
    navigator.clipboard.writeText(url).then(() => {
      showShareToast('Link copied for ' + person.name.split(' ')[0] + '!');
    }).catch(() => {
      showShareToast('URL: ' + url);
    });
  }

  function showShareToast(msg) {
    let toast = document.getElementById('share-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'share-toast';
      toast.className = 'share-toast';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ═══ SEARCH ═══
  function setupSearch() {
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.trim().toLowerCase();
      if (query.length < 2) {
        searchResults.classList.remove('open');
        return;
      }

      const matches = allMembers.filter(m =>
        m.name.toLowerCase().includes(query) ||
        m.relation.toLowerCase().includes(query)
      ).slice(0, 6);

      if (matches.length === 0) {
        searchResults.classList.remove('open');
        return;
      }

      searchResults.innerHTML = matches.map(m => `
        <div class="search-result-item" data-id="${m.id}">
          <img class="sr-avatar" src="${m.photo ? 'photos/' + m.photo : getPlaceholderAvatar(m)}" alt="${m.name}" onerror="this.src='${getPlaceholderAvatar(m)}'">
          <div>
            <div class="sr-name">${highlightMatch(m.name, query)}</div>
            <div class="sr-relation">${m.relation}</div>
          </div>
        </div>
      `).join('');

      searchResults.classList.add('open');

      // Click handlers
      searchResults.querySelectorAll('.search-result-item').forEach(item => {
        item.addEventListener('click', () => {
          const id = parseInt(item.dataset.id);
          const person = allMembers.find(m => m.id === id);
          if (person) openPersonModal(person);
          searchResults.classList.remove('open');
          searchInput.value = '';
        });
      });
    });

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrapper')) {
        searchResults.classList.remove('open');
      }
    });
  }

  function highlightMatch(text, query) {
    const idx = text.toLowerCase().indexOf(query);
    if (idx === -1) return text;
    return text.slice(0, idx) + '<strong>' + text.slice(idx, idx + query.length) + '</strong>' + text.slice(idx + query.length);
  }

  function getPlaceholderAvatar(member) {
    const colors = {
      self: '#d4a84b',
      mother: '#7a9e7e', father: '#5d7fa3',
      grandmother: '#7a9e7e', grandfather: '#5d7fa3',
      great_grandmother: '#8aae8e', great_grandfather: '#6d8fb3',
      aunt: '#9ab89e', uncle: '#7d99b3',
      cousin: '#b0a080', sibling: '#c4956a',
    };
    const color = colors[member.relation] || (member.side === 'maternal' ? '#7a9e7e' : member.side === 'paternal' ? '#5d7fa3' : '#b86e3a');
    const initial = member.name.charAt(0).toUpperCase();
    return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><rect width="120" height="120" rx="60" fill="${color}" opacity="0.15"/><text x="60" y="66" text-anchor="middle" font-family="Georgia,serif" font-size="42" font-weight="600" fill="${color}">${initial}</text></svg>`)}`;
  }

  // ═══ PERSON MODAL ═══
  function setupModal() {
    modal.addEventListener('click', (e) => {
      if (e.target === modal || e.target.closest('.modal-close')) {
        modal.classList.remove('open');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') modal.classList.remove('open');
    });
  }

  function openPersonModal(person) {
    const photoEl = document.getElementById('modal-photo');
    const placeholder = getPlaceholderAvatar(person);
    photoEl.src = person.photo ? 'photos/' + person.photo : placeholder;
    photoEl.onerror = () => { photoEl.src = placeholder; };
    photoEl.alt = person.name;

    document.getElementById('modal-name').textContent = person.name;

    // Build relation subtitle with side
    let relationText = formatRelation(person.relation);
    if (person.side) {
      relationText += ' · ' + person.side.charAt(0).toUpperCase() + person.side.slice(1) + ' side';
    }
    document.getElementById('modal-relation').textContent = relationText;

    // Born / Died with year extraction for clean display
    let lifespan = '';
    if (person.born) {
      const birthYear = extractYear(person.born);
      lifespan = birthYear ? String(birthYear) : person.born;
      if (person.died) {
        const deathYear = extractYear(person.died);
        lifespan += ' — ' + (deathYear ? String(deathYear) : person.died);
      } else if (person.relation !== 'self') {
        lifespan += ' — present';
      }
    }
    setModalDetail('modal-born', 'Lifespan', lifespan);
    setModalDetail('modal-birthplace', 'Birthplace', person.birthplace || '');
    setModalDetail('modal-bio', 'About', person.bio || '');
    setModalDetail('modal-fact', 'Fun Fact', person.fun_fact || '');

    // Wire up modal action buttons
    const shareBtn = document.getElementById('modal-share-btn');
    const findBtn = document.getElementById('modal-find-btn');
    if (shareBtn) {
      shareBtn.onclick = () => sharePersonLink(person);
    }
    if (findBtn) {
      findBtn.onclick = () => {
        modal.classList.remove('open');
        switchView('tree');
        window.location.hash = '#/tree';
        setTimeout(() => highlightPerson(person.id), 400);
      };
    }

    modal.classList.add('open');
  }

  function setModalDetail(id, label, value) {
    const el = document.getElementById(id);
    if (value) {
      el.innerHTML = `<strong>${label}</strong>${value}`;
      el.style.display = '';
    } else {
      el.style.display = 'none';
    }
  }

  function formatRelation(rel) {
    return rel.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }

  // ═══════════════════════════════════════════════
  //  VIEW RENDERERS
  //  Each one hides the loading skeleton and draws
  // ═══════════════════════════════════════════════

  // ─── TREE VIEW (Top-down descendants tree) ───
  function renderTree() {
    const container = document.getElementById('tree-canvas');
    const loading = document.getElementById('loading-tree');

    if (!familyData || !allMembers.length) return;
    if (loading) loading.style.display = 'none';
    container.innerHTML = '';

    // Build top-down tree from oldest ancestors
    const treeData = buildDescendantTree(allMembers);
    if (!treeData) return;

    const root = d3.hierarchy(treeData, function(d) { return d.children; });
    const totalLeaves = root.leaves().length;

    const containerWidth = container.clientWidth || 1000;
    const width = Math.max(containerWidth, totalLeaves * 120, 900);
    const height = Math.max(550, (root.height + 1) * 160);

    const svg = d3.select(container)
      .append('svg')
      .attr('viewBox', '0 0 ' + width + ' ' + height)
      .attr('preserveAspectRatio', 'xMidYMid meet');

    const g = svg.append('g').attr('transform', 'translate(0, 40)');
    const defs = svg.append('defs');

    var treeLayout = d3.tree()
      .size([width - 60, height - 100])
      .separation(function(a, b) { return a.parent === b.parent ? 1 : 1.4; });

    treeLayout(root);

    // Links
    var links = g.selectAll('.tree-link').data(root.links()).join('path')
      .attr('class', 'tree-link')
      .attr('d', d3.linkVertical().x(function(d) { return d.x; }).y(function(d) { return d.y; }));

    links.each(function() {
      var len = this.getTotalLength();
      d3.select(this).attr('stroke-dasharray', len).attr('stroke-dashoffset', len)
        .transition().duration(800).ease(d3.easeCubicOut).attr('stroke-dashoffset', 0);
    });

    // Nodes
    var nodeR = function(d) {
      if (d.data._isVirtualRoot) return 0;
      if (d.data.relation === 'self') return 28;
      return 20;
    };

    var nodes = g.selectAll('.tree-node').data(root.descendants().filter(function(d) { return !d.data._isVirtualRoot; }))
      .join('g')
      .attr('class', function(d) { return 'tree-node ' + (d.data.side || ''); })
      .attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; })
      .style('cursor', 'pointer').style('opacity', 0)
      .on('click', function(event, d) { openPersonModal(d.data); });

    nodes.transition().duration(600).delay(function(d, i) { return i * 40; }).style('opacity', 1);

    // Clip paths
    nodes.each(function(d) {
      defs.append('clipPath').attr('id', 'clip-' + d.data.id).append('circle').attr('r', nodeR(d));
    });

    // Background
    nodes.append('circle').attr('r', nodeR).attr('fill', 'var(--bg-warm)');

    // Photos or initials
    nodes.each(function(d) {
      var node = d3.select(this);
      var r = nodeR(d);
      function showInitial() {
        node.append('text').attr('dy', '0.35em').attr('text-anchor', 'middle')
          .attr('font-size', r > 24 ? '16px' : '11px').attr('font-weight', '600')
          .attr('fill', d.data.relation === 'self' ? '#b86e3a' : '#6b6054')
          .text(d.data.name.charAt(0));
      }
      if (d.data.photo) {
        var testImg = new Image();
        testImg.onload = function() {
          node.append('image').attr('href', 'photos/' + d.data.photo)
            .attr('x', -r).attr('y', -r).attr('width', r * 2).attr('height', r * 2)
            .attr('clip-path', 'url(#clip-' + d.data.id + ')')
            .attr('preserveAspectRatio', 'xMidYMid slice');
        };
        testImg.onerror = showInitial;
        testImg.src = 'photos/' + d.data.photo;
      } else { showInitial(); }
    });

    // Stroke ring
    nodes.append('circle').attr('r', nodeR).attr('fill', 'none').attr('stroke-width', function(d) {
      return d.data.relation === 'self' ? 3 : 1.5;
    });

    // Highlight Ava with a golden ring
    nodes.filter(function(d) { return d.data.relation === 'self'; })
      .append('circle').attr('r', function(d) { return nodeR(d) + 4; })
      .attr('fill', 'none').attr('stroke', '#d4a84b').attr('stroke-width', 2).attr('opacity', 0.6);

    // Name labels below
    nodes.append('text')
      .attr('dy', function(d) { return nodeR(d) + 14; })
      .attr('text-anchor', 'middle')
      .attr('font-size', function(d) { return d.data.relation === 'self' ? '12px' : '10px'; })
      .attr('font-weight', function(d) { return d.data.relation === 'self' ? '600' : '400'; })
      .attr('fill', 'var(--text-secondary)')
      .text(function(d) {
        var name = d.data.name;
        if (name.length <= 18) return name;
        var parts = name.split(' ');
        return parts[0] + ' ' + parts[parts.length - 1].charAt(0) + '.';
      });

    // Spouse labels (show "+ SpouseName" next to married couples)
    nodes.each(function(d) {
      if (d.data.spouse_id) {
        var spouse = allMembers.find(function(m) { return m.id === d.data.spouse_id; });
        if (spouse && d.children && d.children.length > 0) {
          // Only show spouse label on the person who has children listed under them
          d3.select(this).append('text')
            .attr('dy', function() { return nodeR(d) + 26; })
            .attr('text-anchor', 'middle')
            .attr('font-size', '9px')
            .attr('fill', 'var(--text-muted)')
            .attr('font-style', 'italic')
            .text('+ ' + spouse.name.split(' ')[0]);
        }
      }
    });

    // Zoom & pan with auto-fit
    var zoom = d3.zoom().scaleExtent([0.2, 3])
      .on('zoom', function(event) { g.attr('transform', event.transform); });
    svg.call(zoom);

    // Auto-fit
    setTimeout(function() {
      var bounds = g.node().getBBox();
      var scale = Math.min(width / (bounds.width + 80), height / (bounds.height + 80), 1);
      var tx = (width - bounds.width * scale) / 2 - bounds.x * scale;
      var ty = (height - bounds.height * scale) / 2 - bounds.y * scale + 20;
      svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    }, 100);
  }

  // ─── RADIAL VIEW ───
  function renderRadial() {
    const container = document.getElementById('radial-canvas');
    const loading = document.getElementById('loading-radial');

    if (!familyData || !familyData.root) return;

    if (loading) loading.style.display = 'none';
    container.innerHTML = '';

    const size = Math.min(container.clientWidth || 800, window.innerHeight - 160, 800);
    const radius = size / 2;
    const centerRadius = 65; // Space for Ava's center circle

    const svg = d3.select(container)
      .append('svg')
      .attr('viewBox', `${-radius} ${-radius} ${size} ${size}`)
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .style('max-width', size + 'px');

    const g = svg.append('g');
    const defs = svg.append('defs');

    const root = d3.hierarchy(familyData.root, d => d.parents)
      .sum(() => 1)  // Each person counts as 1 — required for partition layout
      .sort((a, b) => (a.data.side || '').localeCompare(b.data.side || ''));

    console.log('Radial hierarchy — depth:', root.height, 'nodes:', root.descendants().length);

    // Use partition but map y values to leave center space
    const partition = d3.partition()
      .size([2 * Math.PI, radius]);

    partition(root);

    // Remap: root gets center circle, ancestors get outer rings
    const maxDepth = root.height || 1;
    const ringWidth = (radius - centerRadius - 10) / maxDepth;

    const arc = d3.arc()
      .startAngle(d => d.x0)
      .endAngle(d => d.x1)
      .innerRadius(d => d.depth === 0 ? 0 : centerRadius + (d.depth - 1) * ringWidth)
      .outerRadius(d => d.depth === 0 ? centerRadius : centerRadius + d.depth * ringWidth - 3)
      .padAngle(0.015)
      .padRadius(radius / 3);

    const maternalColor = d3.scaleLinear().domain([0, maxDepth + 1]).range(['#7a9e7e', '#b8d4ba']);
    const paternalColor = d3.scaleLinear().domain([0, maxDepth + 1]).range(['#5d7fa3', '#a8c4de']);

    function getColor(d) {
      if (d.depth === 0) return '#d4a84b';
      if (d.data.side === 'paternal') return paternalColor(d.depth);
      return maternalColor(d.depth);
    }

    // Draw arcs
    let clickTimer = null;
    const arcs = g.selectAll('.radial-arc')
      .data(root.descendants())
      .join('path')
      .attr('class', 'radial-arc')
      .attr('d', arc)
      .attr('fill', d => getColor(d))
      .attr('opacity', 0.85)
      .style('cursor', 'pointer')
      .on('click', (event, d) => {
        // Single click = zoom to branch, double click = open modal
        if (clickTimer) {
          clearTimeout(clickTimer);
          clickTimer = null;
          openPersonModal(d.data);
        } else {
          clickTimer = setTimeout(() => {
            clickTimer = null;
            // Zoom into this arc's angular range
            const angle = (d.x0 + d.x1) / 2;
            const midR = d.depth === 0 ? 0 : centerRadius + (d.depth - 0.5) * ringWidth;
            const scale = d.depth === 0 ? 1 : Math.min(2.5, Math.PI / (d.x1 - d.x0 + 0.3));
            const x = Math.sin(angle) * midR;
            const y = -Math.cos(angle) * midR;
            g.transition().duration(600).ease(d3.easeCubicOut)
              .attr('transform', `translate(${-x * (scale-1)},${-y * (scale-1)}) scale(${scale})`);
          }, 250);
        }
      })
      .on('mouseenter', function() { d3.select(this).attr('opacity', 1).attr('stroke', '#fff').attr('stroke-width', 2); })
      .on('mouseleave', function() { d3.select(this).attr('opacity', 0.85).attr('stroke', 'none'); });

    arcs.append('title').text(d => d.data.name);

    // Labels on arcs (skip root — handled separately)
    g.selectAll('.radial-label')
      .data(root.descendants().filter(d => d.depth > 0))
      .join('text')
      .attr('class', 'radial-label')
      .attr('transform', d => {
        const angle = (d.x0 + d.x1) / 2;
        const midR = centerRadius + (d.depth - 0.5) * ringWidth;
        const x = Math.sin(angle) * midR;
        const y = -Math.cos(angle) * midR;
        let rotate = (angle * 180 / Math.PI) - 90;
        if (angle > Math.PI) rotate += 180;
        return `translate(${x},${y}) rotate(${rotate})`;
      })
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'middle')
      .attr('font-family', 'Outfit, sans-serif')
      .attr('font-size', d => {
        const arcSpan = d.x1 - d.x0;
        // Scale font based on available arc space
        if (d.depth <= 1) return arcSpan > 0.8 ? '12px' : arcSpan > 0.4 ? '11px' : '9px';
        if (d.depth <= 2) return arcSpan > 0.4 ? '10px' : '8px';
        return arcSpan > 0.3 ? '9px' : '7px';
      })
      .attr('fill', '#fff')
      .attr('font-weight', d => d.depth <= 1 ? '500' : '400')
      .attr('pointer-events', 'none')
      .text(d => {
        const arcSpan = d.x1 - d.x0;
        const availableWidth = arcSpan * (centerRadius + (d.depth - 0.5) * ringWidth);
        // Use first name + last name, or just first name if tight
        const parts = d.data.name.split(' ');
        const firstName = parts[0];
        const lastName = parts[parts.length - 1];
        const shortName = firstName + ' ' + lastName;
        const fullName = d.data.name;

        // Approximate chars that fit (roughly 6px per char)
        const maxChars = Math.floor(availableWidth / 5.5);

        if (fullName.length <= maxChars) return fullName;
        if (shortName.length <= maxChars && parts.length > 2) return shortName;
        if (firstName.length <= maxChars) return firstName;
        return firstName.slice(0, maxChars - 1) + '…';
      });

    // Center: photo if available, otherwise first name
    if (familyData.root.photo) {
      const cr = centerRadius - 5;
      defs.append('clipPath')
        .attr('id', 'clip-center')
        .append('circle')
        .attr('r', cr);

      const testImg = new Image();
      testImg.onload = function() {
        g.append('image')
          .attr('href', 'photos/' + familyData.root.photo)
          .attr('x', -cr).attr('y', -cr)
          .attr('width', cr * 2).attr('height', cr * 2)
          .attr('clip-path', 'url(#clip-center)')
          .attr('preserveAspectRatio', 'xMidYMid slice')
          .style('pointer-events', 'none');
      };
      testImg.src = 'photos/' + familyData.root.photo;
    }

    // Name below center circle
    g.append('text')
      .attr('text-anchor', 'middle')
      .attr('y', centerRadius + 16)
      .attr('font-family', 'Cormorant Garamond, serif')
      .attr('font-size', '14px')
      .attr('font-weight', '600')
      .attr('fill', 'var(--text)')
      .text(familyData.root.name.split(' ')[0]);

    // Zoom & pan
    const zoom = d3.zoom()
      .scaleExtent([0.5, 3])
      .on('zoom', (event) => g.attr('transform', event.transform));
    svg.call(zoom);
  }

  // ─── CARDS VIEW ───
  function renderCards(filterSide, filterGen) {
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';

    let filtered = [...allMembers];
    if (filterSide && filterSide !== 'all') {
      filtered = filtered.filter(m => m.side === filterSide || m.generation === 0);
    }
    if (filterGen !== undefined && filterGen !== 'all') {
      filtered = filtered.filter(m => m.generation === parseInt(filterGen));
    }

    filtered.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = 'person-card';
      card.style.animationDelay = `${i * 0.06}s`;

      const placeholder = getPlaceholderAvatar(m);
      const photoSrc = m.photo ? 'photos/' + m.photo : placeholder;
      const tagClass = m.side === 'maternal' ? 'maternal' : m.side === 'paternal' ? 'paternal' : '';

      card.innerHTML = `
        <img class="card-photo" src="${photoSrc}" alt="${m.name}" onerror="this.src='${placeholder}'">
        <div class="card-name">${m.name}</div>
        <div class="card-relation">${formatRelation(m.relation)}</div>
        ${tagClass ? `<span class="card-tag ${tagClass}">${m.side}</span>` : ''}
      `;

      card.addEventListener('click', () => openPersonModal(m));
      grid.appendChild(card);
    });

    // Filter button handlers
    setupCardFilters();
  }

  function setupCardFilters() {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.closest('.filter-group').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const side = btn.dataset.filter;
        const gen = document.querySelector('.filter-btn[data-gen].active')?.dataset.gen;
        renderCards(side, gen);
      });
    });

    document.querySelectorAll('.filter-btn[data-gen]').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.closest('.filter-group').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const gen = btn.dataset.gen;
        const side = document.querySelector('.filter-btn[data-filter].active')?.dataset.filter;
        renderCards(side, gen);
      });
    });
  }

  // ─── TIMELINE VIEW ───
  function renderTimeline() {
    const container = document.getElementById('timeline-canvas');

    if (!familyData) return;

    container.innerHTML = '';

    const events = familyData.events || buildEventsFromMembers(allMembers);
    const validEvents = events.filter(e => e.year && !isNaN(e.year));

    if (validEvents.length === 0) {
      container.innerHTML = '<p style="text-align:center;color:#9a9184;padding:80px 24px;font-style:italic;">Add birth years to your family data to see the timeline.</p>';
      return;
    }

    // Group events by decade
    const decades = {};
    validEvents.forEach(evt => {
      const decade = Math.floor(evt.year / 10) * 10;
      if (!decades[decade]) decades[decade] = [];
      decades[decade].push(evt);
    });

    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'max-width:600px;margin:0 auto;position:relative;padding:20px 0 40px;';

    // Central line
    const line = document.createElement('div');
    line.style.cssText = 'position:absolute;left:24px;top:0;bottom:0;width:3px;background:linear-gradient(180deg, var(--accent), var(--maternal));border-radius:2px;';
    wrapper.appendChild(line);

    const sortedDecades = Object.keys(decades).map(Number).sort((a, b) => a - b);

    sortedDecades.forEach(decade => {
      const section = document.createElement('div');
      section.className = 'decade-section';

      // Decade header (clickable to collapse)
      const header = document.createElement('div');
      header.className = 'decade-header';
      header.innerHTML = `<div style="position:absolute;left:17px;top:18px;width:17px;height:17px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);z-index:2;"></div>${decade}s <span class="decade-toggle">▼</span>`;
      header.addEventListener('click', () => {
        section.classList.toggle('collapsed');
      });
      section.appendChild(header);

      // Snapshot chips (visible when collapsed)
      const snapshot = document.createElement('div');
      snapshot.className = 'decade-snapshot';
      decades[decade].sort((a, b) => a.year - b.year).forEach(evt => {
        const chip = document.createElement('span');
        chip.className = 'decade-snap-chip';
        chip.textContent = evt.person.split(' ')[0];
        chip.addEventListener('click', (e) => {
          e.stopPropagation();
          const person = allMembers.find(m => m.id === evt.personId);
          if (person) openPersonModal(person);
        });
        snapshot.appendChild(chip);
      });
      section.appendChild(snapshot);

      // Events container
      const eventsDiv = document.createElement('div');
      eventsDiv.className = 'decade-events';

      decades[decade].sort((a, b) => a.year - b.year).forEach(evt => {
        const eventEl = document.createElement('div');
        eventEl.style.cssText = 'position:relative;padding:8px 16px 8px 56px;cursor:pointer;transition:background 0.15s;';
        eventEl.addEventListener('mouseenter', () => { eventEl.style.background = 'rgba(184,110,58,0.04)'; });
        eventEl.addEventListener('mouseleave', () => { eventEl.style.background = 'transparent'; });

        const dot = document.createElement('div');
        dot.style.cssText = `position:absolute;left:20px;top:16px;width:11px;height:11px;border-radius:50%;border:2.5px solid var(--bg);z-index:2;background:${evt.type === 'birth' ? 'var(--maternal)' : evt.type === 'death' ? 'var(--text-muted)' : 'var(--accent)'};`;
        eventEl.appendChild(dot);

        const card = document.createElement('div');
        card.style.cssText = 'background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:14px 18px;box-shadow:var(--shadow-sm);transition:box-shadow 0.2s, transform 0.2s;';
        eventEl.addEventListener('mouseenter', () => { card.style.boxShadow = 'var(--shadow-md)'; card.style.transform = 'translateX(4px)'; });
        eventEl.addEventListener('mouseleave', () => { card.style.boxShadow = 'var(--shadow-sm)'; card.style.transform = 'none'; });

        // Find person for side coloring
        const person = allMembers.find(m => m.id === evt.personId);
        const sideColor = person?.side === 'maternal' ? 'var(--maternal)' : person?.side === 'paternal' ? 'var(--paternal)' : 'var(--accent)';
        const sideDot = person?.side ? `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${sideColor};margin-right:6px;vertical-align:middle;"></span>` : '';

        card.innerHTML = `
          <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:2px;">
            <span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);font-weight:600;">${evt.year}</span>
            <span style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--text);">${evt.person}</span>
          </div>
          <div style="font-size:13px;color:var(--text-muted);">${sideDot}${evt.type === 'birth' ? '🌱 Born' : evt.type === 'death' ? '🕊 Passed away' : evt.type}${person?.birthplace ? ' · ' + person.birthplace : ''}</div>
        `;

        eventEl.appendChild(card);
        eventEl.addEventListener('click', () => {
          if (person) openPersonModal(person);
        });

        eventsDiv.appendChild(eventEl);
      });

      section.appendChild(eventsDiv);
      wrapper.appendChild(section);
    });

    container.appendChild(wrapper);
  }

  // ═══ DARK MODE ═══
  function setupDarkMode() {
    const btn = document.getElementById('dark-mode-btn');
    // Restore saved preference
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      btn.textContent = '☀️';
    }
    btn.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        btn.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        btn.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
      // Re-render current view since colors changed
      renderCurrentView();
    });
  }

  // ═══ FAMILY STATS ═══
  function setupStats() {
    document.getElementById('stats-btn').addEventListener('click', () => {
      renderStats();
      document.getElementById('stats-modal').classList.add('open');
    });
    document.getElementById('stats-modal').addEventListener('click', (e) => {
      if (e.target.id === 'stats-modal') e.target.classList.remove('open');
    });
  }

  function renderStats() {
    const container = document.getElementById('stats-content');
    if (!allMembers.length) {
      container.innerHTML = '<p style="text-align:center;color:var(--text-muted);">No family data loaded yet.</p>';
      return;
    }

    const total = allMembers.length;
    const maternal = allMembers.filter(m => m.side === 'maternal').length;
    const paternal = allMembers.filter(m => m.side === 'paternal').length;
    const generations = Math.max(...allMembers.map(m => m.generation)) + 1;

    // Oldest ancestor
    const withBirthYear = allMembers.filter(m => extractYear(m.born)).map(m => ({ ...m, birthYear: extractYear(m.born) }));
    const oldest = withBirthYear.length ? withBirthYear.sort((a, b) => a.birthYear - b.birthYear)[0] : null;
    const youngest = withBirthYear.length ? withBirthYear.sort((a, b) => b.birthYear - a.birthYear)[0] : null;

    // Year span
    const yearSpan = oldest && youngest ? youngest.birthYear - oldest.birthYear : 0;

    // Most common first letter
    const firstNames = allMembers.map(m => m.name.split(' ')[0]);
    const letterCounts = {};
    firstNames.forEach(n => { const l = n[0].toUpperCase(); letterCounts[l] = (letterCounts[l] || 0) + 1; });
    const topLetter = Object.entries(letterCounts).sort((a, b) => b[1] - a[1])[0];

    container.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">${total}</div>
          <div class="stat-label">Family Members</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${generations}</div>
          <div class="stat-label">Generations</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color:var(--maternal);">${maternal}</div>
          <div class="stat-label">Maternal Side</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color:var(--paternal);">${paternal}</div>
          <div class="stat-label">Paternal Side</div>
        </div>
        ${oldest ? `
        <div class="stat-card full-width">
          <div class="stat-value small">${oldest.name}</div>
          <div class="stat-label">Oldest Ancestor · Born ${oldest.birthYear}</div>
        </div>` : ''}
        <div class="stat-card">
          <div class="stat-value">${yearSpan}</div>
          <div class="stat-label">Years of History</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${topLetter ? topLetter[0] : '—'}</div>
          <div class="stat-label">Most Common Initial (${topLetter ? topLetter[1] : 0})</div>
        </div>
      </div>
    `;
  }

  // ═══ PRINT / POSTER MODE ═══
  function setupPrint() {
    const printBtn = document.getElementById('radial-print-btn');
    const resetBtn = document.getElementById('radial-reset-btn');

    if (printBtn) {
      printBtn.addEventListener('click', () => {
        switchView('radial');
        setTimeout(() => window.print(), 300);
      });
    }
    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        renderRadial();
      });
    }
  }

  // ═══ HERO BANNER ═══
  function populateHero() {
    if (!allMembers.length) return;

    const banner = document.getElementById('hero-banner');
    banner.style.display = '';

    // Photo
    const photoWrap = document.getElementById('hero-photo');
    const root = allMembers.find(m => m.generation === 0);
    if (root && root.photo) {
      photoWrap.innerHTML = `<img src="photos/${root.photo}" alt="${root.name}" onerror="this.parentElement.innerHTML='🌳'">`;
    } else {
      photoWrap.innerHTML = '🌳';
      photoWrap.style.fontSize = '28px';
      photoWrap.style.color = '#fff';
    }

    // Title & subtitle
    const total = allMembers.length;
    const generations = Math.max(...allMembers.map(m => m.generation)) + 1;
    const withBirthYear = allMembers.filter(m => extractYear(m.born)).map(m => ({ ...m, birthYear: extractYear(m.born) }));
    const oldest = withBirthYear.length ? withBirthYear.sort((a, b) => a.birthYear - b.birthYear)[0] : null;
    const yearSpan = oldest ? new Date().getFullYear() - oldest.birthYear : 0;

    document.getElementById('hero-subtitle').textContent = `${total} family members · ${generations} generations${yearSpan ? ' · ' + yearSpan + ' years of history' : ''}`;

    // Stats
    const maternal = allMembers.filter(m => m.side === 'maternal').length;
    const paternal = allMembers.filter(m => m.side === 'paternal').length;

    document.getElementById('hero-stats').innerHTML = `
      <div class="hero-stat">
        <div class="hero-stat-value">${total}</div>
        <div class="hero-stat-label">Members</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-value">${generations}</div>
        <div class="hero-stat-label">Generations</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-value" style="color:var(--maternal)">${maternal}</div>
        <div class="hero-stat-label">Maternal</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-value" style="color:var(--paternal)">${paternal}</div>
        <div class="hero-stat-label">Paternal</div>
      </div>
    `;
  }

  // ═══ SOCIAL SHARE ═══
  function shareTree(platform) {
    const url = window.location.origin + window.location.pathname;
    const text = "Check out Ava's Family Tree — an interactive family tree spanning generations!";

    switch(platform) {
      case 'copy':
        navigator.clipboard.writeText(url).then(() => {
          showShareToast('Link copied!');
        }).catch(() => {
          showShareToast(url);
        });
        break;
      case 'twitter':
        window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
        break;
      case 'whatsapp':
        window.open(`https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`, '_blank');
        break;
    }
  }

  // ═══ KICK IT OFF ═══
  // Expose share function globally for onclick handlers
  window.shareTree = shareTree;
  
  document.addEventListener('DOMContentLoaded', init);

})();
  </script>
