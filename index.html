<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌳 Ava's Family Tree</title>
  <meta name="description" content="Ava Michele Etwaroo's interactive family tree — explore generations through tree, radial, card, and timeline views.">

  <!-- Open Graph -->
  <meta property="og:title" content="Ava's Family Tree">
  <meta property="og:description" content="Ava's interactive family tree — explore generations through multiple views.">
  <meta property="og:type" content="website">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- D3.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>

  <!-- Styles -->
  <style>
/* ═══════════════════════════════════════════════
   FAMILY TREE — STYLE SYSTEM
   Aesthetic: Warm organic · heirloom · editorial
   ═══════════════════════════════════════════════ */

:root {
  /* Palette */
  --bg:            #f7f4ef;
  --bg-warm:       #f0ebe2;
  --bg-card:       #ffffff;
  --text:          #2c2419;
  --text-secondary:#6b6054;
  --text-muted:    #9a9184;
  --accent:        #b86e3a;
  --accent-hover:  #9c5a2c;
  --accent-light:  #f3e4d4;
  --maternal:      #7a9e7e;
  --maternal-light:#e4efe5;
  --paternal:      #5d7fa3;
  --paternal-light:#dce8f3;
  --border:        #e2dbd0;
  --border-light:  #ece7df;
  --shadow-sm:     0 1px 3px rgba(44,36,25,0.06);
  --shadow-md:     0 4px 16px rgba(44,36,25,0.08);
  --shadow-lg:     0 12px 40px rgba(44,36,25,0.12);
  --radius:        12px;
  --radius-sm:     8px;
  --radius-lg:     16px;

  /* Typography */
  --font-display:  'Cormorant Garamond', Georgia, serif;
  --font-body:     'Outfit', -apple-system, sans-serif;
  --font-mono:     'JetBrains Mono', monospace;

  /* Transitions */
  --ease:          cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-bounce:   cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ─── Reset ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* Subtle paper texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ═══ HEADER ═══ */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(247, 244, 239, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-light);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text);
  flex-shrink: 0;
}
.logo-icon {
  font-size: 24px;
  line-height: 1;
}
.logo-text {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

/* View Nav Tabs */
.view-nav {
  display: flex;
  gap: 4px;
  background: var(--bg-warm);
  border-radius: 10px;
  padding: 4px;
  margin: 0 auto;
}
.view-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  background: transparent;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.25s var(--ease);
  white-space: nowrap;
}
.view-tab:hover {
  color: var(--text-secondary);
  background: rgba(255,255,255,0.5);
}
.view-tab.active {
  color: var(--text);
  background: var(--bg-card);
  box-shadow: var(--shadow-sm);
}
.view-tab svg { opacity: 0.6; transition: opacity 0.2s; }
.view-tab.active svg { opacity: 1; }

/* Header Actions */
.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.search-wrapper {
  position: relative;
}
.search-input {
  width: 180px;
  padding: 8px 12px 8px 34px;
  border: 1.5px solid var(--border);
  border-radius: 100px;
  background: var(--bg-card);
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: all 0.25s var(--ease);
}
.search-input:focus {
  width: 240px;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.search-input::placeholder { color: var(--text-muted); }
.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}

.search-results {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  right: 0;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  max-height: 280px;
  overflow-y: auto;
  z-index: 200;
}
.search-results.open { display: block; }
.search-result-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  transition: background 0.15s;
  border-bottom: 1px solid var(--border-light);
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--accent-light); }
.search-result-item .sr-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--bg-warm);
}
.search-result-item .sr-name { font-weight: 500; font-size: 14px; }
.search-result-item .sr-relation { font-size: 12px; color: var(--text-muted); }

.admin-link {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--bg-warm);
  text-decoration: none;
  font-size: 16px;
  transition: all 0.2s;
}
.admin-link:hover {
  background: var(--accent-light);
  transform: rotate(90deg);
}

/* ═══ MAIN CONTENT ═══ */
.main-content {
  flex: 1;
  position: relative;
  z-index: 1;
}

.view-container {
  display: none;
  min-height: calc(100vh - 140px);
  padding: 24px;
  animation: viewFadeIn 0.35s var(--ease);
}
.view-container.active { display: block; }

@keyframes viewFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── Loading Skeletons ─── */
.view-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px;
}
.loading-text {
  font-family: var(--font-display);
  font-size: 16px;
  color: var(--text-muted);
  font-style: italic;
  margin-top: 24px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* Tree skeleton */
.skeleton-tree { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.skel-node {
  width: 80px; height: 28px;
  border-radius: 8px;
  background: var(--border-light);
  animation: shimmer 1.8s infinite;
}
.skel-node.root { width: 100px; background: var(--accent-light); }
.skel-node.sm { width: 60px; height: 24px; }
.skel-line { width: 2px; height: 16px; background: var(--border-light); }
.skel-row { display: flex; gap: 16px; }

/* Radial skeleton */
.skeleton-radial { position: relative; width: 200px; height: 200px; }
.skel-ring {
  position: absolute;
  border-radius: 50%;
  border: 2px dashed var(--border-light);
  animation: shimmer 2s infinite;
}
.skel-ring.r1 { width: 80px; height: 80px; top: 60px; left: 60px; }
.skel-ring.r2 { width: 140px; height: 140px; top: 30px; left: 30px; }
.skel-ring.r3 { width: 200px; height: 200px; top: 0; left: 0; }
.skel-center {
  position: absolute;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--accent-light);
  top: 80px; left: 80px;
  animation: shimmer 1.8s infinite;
}

@keyframes shimmer {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

/* ─── Tree View ─── */
#tree-canvas {
  width: 100%;
  min-height: calc(100vh - 160px);
}
#tree-canvas svg {
  width: 100%;
  height: 100%;
}

/* D3 tree nodes */
.tree-node circle {
  fill: var(--bg-card);
  stroke: var(--accent);
  stroke-width: 2px;
  cursor: pointer;
  transition: all 0.2s;
}
.tree-node circle:hover {
  fill: var(--accent-light);
  stroke-width: 3px;
  filter: drop-shadow(0 2px 8px rgba(184,110,58,0.3));
}
.tree-node text {
  font-family: var(--font-body);
  font-size: 12px;
  fill: var(--text);
  pointer-events: none;
}
.tree-node .node-photo {
  cursor: pointer;
}
.tree-link {
  fill: none;
  stroke: var(--border);
  stroke-width: 1.5px;
}
.tree-node.maternal circle { stroke: var(--maternal); }
.tree-node.paternal circle { stroke: var(--paternal); }

/* ─── Radial View ─── */
#radial-canvas {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 160px);
}

.radial-arc {
  cursor: pointer;
  transition: opacity 0.2s;
}
.radial-arc:hover { opacity: 0.85; }

/* ─── Cards View ─── */
.cards-toolbar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  padding: 0 4px;
}
.filter-group {
  display: flex;
  gap: 4px;
  background: var(--bg-warm);
  border-radius: 8px;
  padding: 3px;
}
.filter-btn {
  padding: 6px 14px;
  border: none;
  border-radius: 6px;
  background: transparent;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s var(--ease);
}
.filter-btn:hover { color: var(--text-secondary); }
.filter-btn.active {
  background: var(--bg-card);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.person-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s var(--ease);
  animation: cardIn 0.4s var(--ease-bounce) both;
}
.person-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-md);
  transform: translateY(-3px);
}
.person-card .card-photo {
  width: 72px; height: 72px;
  border-radius: 50%;
  object-fit: cover;
  margin: 0 auto 12px;
  border: 3px solid var(--bg-warm);
  background: var(--bg-warm);
}
.person-card .card-name {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 2px;
}
.person-card .card-relation {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.person-card .card-tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 500;
}
.person-card .card-tag.maternal { background: var(--maternal-light); color: var(--maternal); }
.person-card .card-tag.paternal { background: var(--paternal-light); color: var(--paternal); }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ─── Timeline View ─── */
.timeline-canvas {
  position: relative;
  padding: 40px 0;
  min-height: calc(100vh - 160px);
}
.timeline-axis {
  position: relative;
  width: 4px;
  background: linear-gradient(180deg, var(--accent), var(--maternal));
  margin: 0 auto;
  border-radius: 2px;
}
.timeline-event {
  position: absolute;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: transform 0.2s var(--ease);
}
.timeline-event:hover { transform: scale(1.03); }
.timeline-event.left { flex-direction: row-reverse; right: calc(50% + 20px); }
.timeline-event.right { left: calc(50% + 20px); }
.timeline-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 3px solid var(--bg);
  flex-shrink: 0;
}
.timeline-dot.birth { background: var(--accent); }
.timeline-dot.marriage { background: var(--maternal); }
.timeline-dot.death { background: var(--text-muted); }
.timeline-card {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  max-width: 260px;
  box-shadow: var(--shadow-sm);
}
.timeline-card .tc-year {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
  font-weight: 500;
}
.timeline-card .tc-name {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
}
.timeline-card .tc-event {
  font-size: 13px;
  color: var(--text-muted);
}

/* ═══ PERSON MODAL ═══ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(44,36,25,0.5);
  backdrop-filter: blur(4px);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-overlay.open {
  display: flex;
  animation: modalBgIn 0.3s var(--ease);
}
@keyframes modalBgIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal-content {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 36px;
  max-width: 440px;
  width: 100%;
  position: relative;
  box-shadow: var(--shadow-lg);
  animation: modalSlideIn 0.35s var(--ease-bounce);
  text-align: center;
}
@keyframes modalSlideIn {
  from { opacity: 0; transform: translateY(24px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  width: 32px; height: 32px;
  border: none;
  border-radius: 50%;
  background: var(--bg-warm);
  font-size: 20px;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.modal-close:hover { background: var(--accent-light); color: var(--accent); }

.modal-photo-wrap {
  width: 120px; height: 120px;
  border-radius: 50%;
  margin: 0 auto 16px;
  overflow: hidden;
  border: 4px solid var(--bg-warm);
  background: var(--bg-warm);
}
.modal-photo {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.modal-name {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 2px;
}
.modal-relation {
  font-size: 14px;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 20px;
}

.modal-details {
  text-align: left;
}
.modal-detail {
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 14px;
  line-height: 1.5;
}
.modal-detail:last-child { border-bottom: none; }
.modal-detail strong {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 2px;
}

/* ═══ FOOTER ═══ */
.site-footer {
  text-align: center;
  padding: 24px;
  font-size: 13px;
  color: var(--text-muted);
  border-top: 1px solid var(--border-light);
}

/* ═══ RESPONSIVE ═══ */
@media (max-width: 768px) {
  .header-inner { flex-wrap: wrap; gap: 10px; }
  .view-nav { order: 3; width: 100%; justify-content: center; }
  .view-tab span { display: none; }
  .view-tab { padding: 8px 12px; }
  .search-input { width: 140px; }
  .search-input:focus { width: 180px; }
  .logo-text { font-size: 17px; }

  .view-container { padding: 16px; }

  .cards-grid {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .person-card { padding: 14px; }
  .person-card .card-photo { width: 56px; height: 56px; }
  .person-card .card-name { font-size: 15px; }

  .modal-content { padding: 24px; margin: 12px; }
  .modal-name { font-size: 24px; }
  .modal-photo-wrap { width: 90px; height: 90px; }

  /* Radial — allow horizontal scroll on small screens */
  #radial-canvas { overflow-x: auto; justify-content: flex-start; }
  #radial-canvas svg { min-width: 400px; }

  /* Timeline — tighter on mobile */
  #view-timeline .timeline-canvas { padding: 20px 0; }

  /* Cards toolbar wrapping */
  .cards-toolbar { gap: 8px; }
  .filter-btn { padding: 5px 10px; font-size: 11px; }
}

@media (max-width: 480px) {
  .header-actions { gap: 8px; }
  .logo-text { display: none; }

  .cards-grid {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }

  .view-nav { padding: 3px; gap: 2px; }
  .view-tab { padding: 7px 10px; }

  .modal-content { padding: 20px 16px; }
  .modal-name { font-size: 22px; }
}

/* ═══ UTILITY ═══ */
.hidden { display: none !important; }
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  border: 0;
}
  </style>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌳</text></svg>">
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="logo" aria-label="Home">
        <span class="logo-icon">🌳</span>
        <span class="logo-text">Ava's Family Tree</span>
      </a>

      <nav class="view-nav" role="tablist" aria-label="View selector">
        <button class="view-tab active" data-view="tree" role="tab" aria-selected="true">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="3" r="2"/><circle cx="3" cy="12" r="2"/><circle cx="13" cy="12" r="2"/><line x1="8" y1="5" x2="8" y2="8"/><line x1="8" y1="8" x2="3" y2="10"/><line x1="8" y1="8" x2="13" y2="10"/></svg>
          <span>Tree</span>
        </button>
        <button class="view-tab" data-view="radial" role="tab" aria-selected="false">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><circle cx="8" cy="8" r="6"/><circle cx="8" cy="2" r="1.2"/><circle cx="13" cy="11" r="1.2"/><circle cx="3" cy="11" r="1.2"/></svg>
          <span>Radial</span>
        </button>
        <button class="view-tab" data-view="cards" role="tab" aria-selected="false">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
          <span>Cards</span>
        </button>
        <button class="view-tab" data-view="timeline" role="tab" aria-selected="false">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="8" x2="14" y2="8"/><circle cx="4" cy="8" r="1.5"/><circle cx="8" cy="8" r="1.5"/><circle cx="12" cy="8" r="1.5"/></svg>
          <span>Timeline</span>
        </button>

  <!-- App Scripts -->
  <script>
/* ═══════════════════════════════════════════════
   FAMILY TREE — APP CORE
   Handles: data loading, view switching, search,
   modal, and view renderers (tree, radial, cards, timeline)
   ═══════════════════════════════════════════════ */

(function () {
  'use strict';

  // ─── Config ───
  const SHEETS_CONFIG = {
    apiKey: 'AIzaSyBVnfX5ld_hrU9FWL9F8Pe68jf4ZjyrA3U',
    sheetId: '1hqwlHomJrpSjRpof0dux_4ojRshpHD50s6b33P61Qmc',
    sheetName: 'family',  // Your sheet tab name
  };

  // ─── State ───
  let familyData = null;
  let currentView = 'tree';
  let allMembers = [];

  // ─── DOM References ───
  const viewTabs = document.querySelectorAll('.view-tab');
  const viewContainers = document.querySelectorAll('.view-container');
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  const modal = document.getElementById('person-modal');

  // ═══ INIT ═══
  async function init() {
    setupViewSwitching();
    setupSearch();
    setupModal();
    setupURLRouting();
    await loadData();
  }

  // ═══ DATA LOADING — Google Sheets API ═══
  async function loadData() {
    try {
      // Try Google Sheets API first (live data)
      const members = await fetchFromGoogleSheets();
      if (members && members.length > 0) {
        console.log(`Loaded ${members.length} members from Google Sheets`);
        allMembers = members;
        familyData = {
          members: allMembers,
          root: buildTreeFromFlat(allMembers),
          events: buildEventsFromMembers(allMembers)
        };
        renderCurrentView();
        return;
      }
    } catch (err) {
      console.warn('Google Sheets fetch failed, trying local JSON...', err.message);
    }

    // Fallback to local family.json
    try {
      const response = await fetch('./data/family.json');
      if (!response.ok) throw new Error('No data file found');
      const data = await response.json();
      allMembers = data.members || [];
      familyData = {
        members: allMembers,
        root: buildTreeFromFlat(allMembers),
        events: data.events || buildEventsFromMembers(allMembers)
      };
      console.log(`Loaded ${allMembers.length} members from local JSON`);
      renderCurrentView();
    } catch (err) {
      console.log('No local data either — showing sample data.', err.message);
      loadSampleData();
      renderCurrentView();
    }
  }

  async function fetchFromGoogleSheets() {
    const { apiKey, sheetId, sheetName } = SHEETS_CONFIG;
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(sheetName)}?key=${apiKey}`;

    const response = await fetch(url);
    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      throw new Error(errData.error?.message || `Sheets API returned ${response.status}`);
    }

    const data = await response.json();
    const rows = data.values;
    if (!rows || rows.length < 2) return [];

    // First row = headers, remaining rows = data
    const headers = rows[0].map(h => h.trim().toLowerCase().replace(/\s+/g, '_'));
    const members = [];

    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (!row || row.length === 0) continue;

      // Build object from headers + row values
      const obj = {};
      headers.forEach((header, idx) => {
        obj[header] = (row[idx] || '').trim();
      });

      // Skip rows without a name
      if (!obj.name) continue;

      // Parse into our member format
      members.push({
        id: parseInt(obj.id) || i,
        name: obj.name || '',
        relation: (obj.relation || '').toLowerCase(),
        side: (obj.side || '').toLowerCase(),
        generation: parseInt(obj.generation) || 0,
        parent_id: obj.parent_id ? parseInt(obj.parent_id) : null,
        spouse_id: obj.spouse_id ? parseInt(obj.spouse_id) : null,
        born: obj.born || '',
        died: obj.died || '',
        birthplace: obj.birthplace || '',
        bio: obj.bio || '',
        fun_fact: obj.fun_fact || '',
        photo: obj.photo || '',
      });
    }

    return members;
  }

  function loadSampleData() {
    // Sample data so the site works before real data is connected
    allMembers = [
      { id: 1, name: 'Your Daughter', relation: 'self', side: '', generation: 0, parent_id: 2, spouse_id: null, born: '2020', died: '', birthplace: '', bio: 'The star of the show', fun_fact: '', photo: '' },
      { id: 2, name: 'Mom', relation: 'mother', side: 'maternal', generation: 1, parent_id: 4, spouse_id: 3, born: '1990', died: '', birthplace: '', bio: '', fun_fact: '', photo: '' },
      { id: 3, name: 'Dad', relation: 'father', side: 'paternal', generation: 1, parent_id: 6, spouse_id: 2, born: '1988', died: '', birthplace: '', bio: '', fun_fact: '', photo: '' },
      { id: 4, name: 'Grandma (Maternal)', relation: 'grandmother', side: 'maternal', generation: 2, parent_id: null, spouse_id: 5, born: '1962', died: '', birthplace: '', bio: '', fun_fact: '', photo: '' },
      { id: 5, name: 'Grandpa (Maternal)', relation: 'grandfather', side: 'maternal', generation: 2, parent_id: null, spouse_id: 4, born: '1960', died: '', birthplace: '', bio: '', fun_fact: '', photo: '' },
      { id: 6, name: 'Grandma (Paternal)', relation: 'grandmother', side: 'paternal', generation: 2, parent_id: null, spouse_id: 7, born: '1965', died: '', birthplace: '', bio: '', fun_fact: '', photo: '' },
      { id: 7, name: 'Grandpa (Paternal)', relation: 'grandfather', side: 'paternal', generation: 2, parent_id: null, spouse_id: 6, born: '1963', died: '', birthplace: '', bio: '', fun_fact: '', photo: '' },
    ];

    familyData = {
      members: allMembers,
      root: buildTreeFromFlat(allMembers),
      events: buildEventsFromMembers(allMembers)
    };
  }

  // ─── Build nested tree from flat member list ───
  function buildTreeFromFlat(members) {
    const root = members.find(m => m.generation === 0) || members[0];
    if (!root) return null;

    function attachParents(person) {
      const node = { ...person, parents: [] };

      // Find parents: people whose id matches this person's parent_id, or their spouse
      const directParent = members.find(m => m.id === person.parent_id);
      if (directParent) {
        node.parents.push(attachParents(directParent));
        const spouse = members.find(m => m.id === directParent.spouse_id);
        if (spouse) {
          node.parents.push(attachParents(spouse));
        }
      }

      return node;
    }

    return attachParents(root);
  }

  function buildEventsFromMembers(members) {
    const events = [];
    members.forEach(m => {
      if (m.born) {
        const year = extractYear(m.born);
        if (year) events.push({ year, type: 'birth', person: m.name, personId: m.id });
      }
      if (m.died) {
        const year = extractYear(m.died);
        if (year) events.push({ year, type: 'death', person: m.name, personId: m.id });
      }
    });
    return events.sort((a, b) => a.year - b.year);
  }

  // Extract a 4-digit year from various date formats
  function extractYear(dateStr) {
    if (!dateStr) return null;
    const s = String(dateStr).trim();
    // Try pure number first
    if (/^\d{4}$/.test(s)) return parseInt(s);
    // Look for 4-digit year anywhere in the string
    const match = s.match(/\b(1[0-9]{3}|20[0-9]{2})\b/);
    if (match) return parseInt(match[1]);
    // Try parsing as a date
    const d = new Date(s);
    if (!isNaN(d.getTime())) return d.getFullYear();
    return null;
  }

  // ═══ VIEW SWITCHING ═══
  function setupViewSwitching() {
    viewTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const view = tab.dataset.view;
        switchView(view);
        window.location.hash = '#/' + view;
      });
    });
  }

  function switchView(view) {
    currentView = view;

    viewTabs.forEach(t => {
      t.classList.toggle('active', t.dataset.view === view);
      t.setAttribute('aria-selected', t.dataset.view === view);
    });

    viewContainers.forEach(c => {
      c.classList.toggle('active', c.id === 'view-' + view);
    });

    renderCurrentView();
  }

  function renderCurrentView() {
    switch (currentView) {
      case 'tree':    renderTree(); break;
      case 'radial':  renderRadial(); break;
      case 'cards':   renderCards(); break;
      case 'timeline': renderTimeline(); break;
    }
  }

  // ═══ URL ROUTING ═══
  function setupURLRouting() {
    const hash = window.location.hash.replace('#/', '');
    if (['tree', 'radial', 'cards', 'timeline'].includes(hash)) {
      switchView(hash);
    }

    window.addEventListener('hashchange', () => {
      const h = window.location.hash.replace('#/', '');
      if (['tree', 'radial', 'cards', 'timeline'].includes(h)) {
        switchView(h);
      }
    });
  }

  // ═══ SEARCH ═══
  function setupSearch() {
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.trim().toLowerCase();
      if (query.length < 2) {
        searchResults.classList.remove('open');
        return;
      }

      const matches = allMembers.filter(m =>
        m.name.toLowerCase().includes(query) ||
        m.relation.toLowerCase().includes(query)
      ).slice(0, 6);

      if (matches.length === 0) {
        searchResults.classList.remove('open');
        return;
      }

      searchResults.innerHTML = matches.map(m => `
        <div class="search-result-item" data-id="${m.id}">
          <img class="sr-avatar" src="${m.photo ? 'photos/' + m.photo : getPlaceholderAvatar(m)}" alt="${m.name}" onerror="this.src='${getPlaceholderAvatar(m)}'">
          <div>
            <div class="sr-name">${highlightMatch(m.name, query)}</div>
            <div class="sr-relation">${m.relation}</div>
          </div>
        </div>
      `).join('');

      searchResults.classList.add('open');

      // Click handlers
      searchResults.querySelectorAll('.search-result-item').forEach(item => {
        item.addEventListener('click', () => {
          const id = parseInt(item.dataset.id);
          const person = allMembers.find(m => m.id === id);
          if (person) openPersonModal(person);
          searchResults.classList.remove('open');
          searchInput.value = '';
        });
      });
    });

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrapper')) {
        searchResults.classList.remove('open');
      }
    });
  }

  function highlightMatch(text, query) {
    const idx = text.toLowerCase().indexOf(query);
    if (idx === -1) return text;
    return text.slice(0, idx) + '<strong>' + text.slice(idx, idx + query.length) + '</strong>' + text.slice(idx + query.length);
  }

  function getPlaceholderAvatar(member) {
    const colors = {
      self: '#d4a84b',
      mother: '#7a9e7e', father: '#5d7fa3',
      grandmother: '#7a9e7e', grandfather: '#5d7fa3',
      great_grandmother: '#8aae8e', great_grandfather: '#6d8fb3',
      aunt: '#9ab89e', uncle: '#7d99b3',
      cousin: '#b0a080', sibling: '#c4956a',
    };
    const color = colors[member.relation] || (member.side === 'maternal' ? '#7a9e7e' : member.side === 'paternal' ? '#5d7fa3' : '#b86e3a');
    const initial = member.name.charAt(0).toUpperCase();
    return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><rect width="120" height="120" rx="60" fill="${color}" opacity="0.15"/><text x="60" y="66" text-anchor="middle" font-family="Georgia,serif" font-size="42" font-weight="600" fill="${color}">${initial}</text></svg>`)}`;
  }

  // ═══ PERSON MODAL ═══
  function setupModal() {
    modal.addEventListener('click', (e) => {
      if (e.target === modal || e.target.closest('.modal-close')) {
        modal.classList.remove('open');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') modal.classList.remove('open');
    });
  }

  function openPersonModal(person) {
    const photoEl = document.getElementById('modal-photo');
    const placeholder = getPlaceholderAvatar(person);
    photoEl.src = person.photo ? 'photos/' + person.photo : placeholder;
    photoEl.onerror = () => { photoEl.src = placeholder; };
    photoEl.alt = person.name;

    document.getElementById('modal-name').textContent = person.name;

    // Build relation subtitle with side
    let relationText = formatRelation(person.relation);
    if (person.side) {
      relationText += ' · ' + person.side.charAt(0).toUpperCase() + person.side.slice(1) + ' side';
    }
    document.getElementById('modal-relation').textContent = relationText;

    // Born / Died with year extraction for clean display
    let lifespan = '';
    if (person.born) {
      const birthYear = extractYear(person.born);
      lifespan = birthYear ? String(birthYear) : person.born;
      if (person.died) {
        const deathYear = extractYear(person.died);
        lifespan += ' — ' + (deathYear ? String(deathYear) : person.died);
      } else if (person.relation !== 'self') {
        lifespan += ' — present';
      }
    }
    setModalDetail('modal-born', 'Lifespan', lifespan);
    setModalDetail('modal-birthplace', 'Birthplace', person.birthplace || '');
    setModalDetail('modal-bio', 'About', person.bio || '');
    setModalDetail('modal-fact', 'Fun Fact', person.fun_fact || '');

    modal.classList.add('open');
  }

  function setModalDetail(id, label, value) {
    const el = document.getElementById(id);
    if (value) {
      el.innerHTML = `<strong>${label}</strong>${value}`;
      el.style.display = '';
    } else {
      el.style.display = 'none';
    }
  }

  function formatRelation(rel) {
    return rel.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }

  // ═══════════════════════════════════════════════
  //  VIEW RENDERERS
  //  Each one hides the loading skeleton and draws
  // ═══════════════════════════════════════════════

  // ─── TREE VIEW ───
  function renderTree() {
    const container = document.getElementById('tree-canvas');
    const loading = document.getElementById('loading-tree');

    if (!familyData || !familyData.root) return;

    // Hide skeleton
    if (loading) loading.style.display = 'none';

    // Clear previous
    container.innerHTML = '';

    const width = container.clientWidth || 900;
    const height = Math.max(500, window.innerHeight - 180);

    const svg = d3.select(container)
      .append('svg')
      .attr('viewBox', `0 0 ${width} ${height}`)
      .attr('preserveAspectRatio', 'xMidYMid meet');

    const g = svg.append('g')
      .attr('transform', `translate(${width / 2}, 60)`);

    // Convert our data to D3 hierarchy (reverse: root = daughter, children = parents)
    const root = d3.hierarchy(familyData.root, d => d.parents);

    const treeLayout = d3.tree()
      .size([width - 120, height - 140])
      .separation((a, b) => a.parent === b.parent ? 1.2 : 1.8);

    treeLayout(root);

    // Center horizontally
    const offsetX = -width / 2 + 60;

    // Links
    g.selectAll('.tree-link')
      .data(root.links())
      .join('path')
      .attr('class', 'tree-link')
      .attr('d', d3.linkVertical()
        .x(d => d.x + offsetX)
        .y(d => d.y)
      );

    // Nodes
    const nodes = g.selectAll('.tree-node')
      .data(root.descendants())
      .join('g')
      .attr('class', d => `tree-node ${d.data.side || ''}`)
      .attr('transform', d => `translate(${d.x + offsetX}, ${d.y})`)
      .style('cursor', 'pointer')
      .on('click', (event, d) => openPersonModal(d.data));

    nodes.append('circle')
      .attr('r', d => d.depth === 0 ? 24 : 18);

    // Initial letter inside circle
    nodes.append('text')
      .attr('dy', '0.35em')
      .attr('text-anchor', 'middle')
      .attr('font-size', d => d.depth === 0 ? '16px' : '12px')
      .attr('font-weight', '600')
      .attr('fill', d => d.depth === 0 ? '#b86e3a' : '#6b6054')
      .text(d => d.data.name.charAt(0));

    // Name label below
    nodes.append('text')
      .attr('dy', d => d.depth === 0 ? 40 : 32)
      .attr('text-anchor', 'middle')
      .attr('font-size', '11px')
      .attr('fill', '#6b6054')
      .text(d => d.data.name.length > 18 ? d.data.name.slice(0, 16) + '…' : d.data.name);

    // Zoom & pan
    const zoom = d3.zoom()
      .scaleExtent([0.3, 3])
      .on('zoom', (event) => g.attr('transform', event.transform));

    svg.call(zoom);
  }

  // ─── RADIAL VIEW ───
  function renderRadial() {
    const container = document.getElementById('radial-canvas');
    const loading = document.getElementById('loading-radial');

    if (!familyData || !familyData.root) return;

    if (loading) loading.style.display = 'none';
    container.innerHTML = '';

    const size = Math.min(container.clientWidth || 700, window.innerHeight - 200, 700);
    const radius = size / 2;
    const centerRadius = 50; // Space for Ava's center circle

    const svg = d3.select(container)
      .append('svg')
      .attr('viewBox', `${-radius} ${-radius} ${size} ${size}`)
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .style('max-width', size + 'px');

    const g = svg.append('g');

    const root = d3.hierarchy(familyData.root, d => d.parents)
      .sum(() => 1)  // Each person counts as 1 — required for partition layout
      .sort((a, b) => (a.data.side || '').localeCompare(b.data.side || ''));

    console.log('Radial hierarchy — depth:', root.height, 'nodes:', root.descendants().length);

    // Use partition but map y values to leave center space
    const partition = d3.partition()
      .size([2 * Math.PI, radius]);

    partition(root);

    // Remap: root gets center circle, ancestors get outer rings
    const maxDepth = root.height || 1;
    const ringWidth = (radius - centerRadius - 10) / maxDepth;

    const arc = d3.arc()
      .startAngle(d => d.x0)
      .endAngle(d => d.x1)
      .innerRadius(d => d.depth === 0 ? 0 : centerRadius + (d.depth - 1) * ringWidth)
      .outerRadius(d => d.depth === 0 ? centerRadius : centerRadius + d.depth * ringWidth - 3)
      .padAngle(0.015)
      .padRadius(radius / 3);

    const maternalColor = d3.scaleLinear().domain([0, maxDepth + 1]).range(['#7a9e7e', '#b8d4ba']);
    const paternalColor = d3.scaleLinear().domain([0, maxDepth + 1]).range(['#5d7fa3', '#a8c4de']);

    function getColor(d) {
      if (d.depth === 0) return '#d4a84b';
      if (d.data.side === 'paternal') return paternalColor(d.depth);
      return maternalColor(d.depth);
    }

    // Draw arcs
    const arcs = g.selectAll('.radial-arc')
      .data(root.descendants())
      .join('path')
      .attr('class', 'radial-arc')
      .attr('d', arc)
      .attr('fill', d => getColor(d))
      .attr('opacity', 0.85)
      .style('cursor', 'pointer')
      .on('click', (event, d) => openPersonModal(d.data))
      .on('mouseenter', function() { d3.select(this).attr('opacity', 1).attr('stroke', '#fff').attr('stroke-width', 2); })
      .on('mouseleave', function() { d3.select(this).attr('opacity', 0.85).attr('stroke', 'none'); });

    arcs.append('title').text(d => d.data.name);

    // Labels on arcs (skip root — handled separately)
    g.selectAll('.radial-label')
      .data(root.descendants().filter(d => d.depth > 0))
      .join('text')
      .attr('class', 'radial-label')
      .attr('transform', d => {
        const angle = (d.x0 + d.x1) / 2;
        const midR = centerRadius + (d.depth - 0.5) * ringWidth;
        const x = Math.sin(angle) * midR;
        const y = -Math.cos(angle) * midR;
        let rotate = (angle * 180 / Math.PI) - 90;
        if (angle > Math.PI) rotate += 180;
        return `translate(${x},${y}) rotate(${rotate})`;
      })
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'middle')
      .attr('font-family', 'Outfit, sans-serif')
      .attr('font-size', d => {
        const arcSpan = d.x1 - d.x0;
        // Scale font based on available arc space
        if (d.depth <= 1) return arcSpan > 0.8 ? '12px' : arcSpan > 0.4 ? '11px' : '9px';
        if (d.depth <= 2) return arcSpan > 0.4 ? '10px' : '8px';
        return arcSpan > 0.3 ? '9px' : '7px';
      })
      .attr('fill', '#fff')
      .attr('font-weight', d => d.depth <= 1 ? '500' : '400')
      .attr('pointer-events', 'none')
      .text(d => {
        const arcSpan = d.x1 - d.x0;
        const availableWidth = arcSpan * (centerRadius + (d.depth - 0.5) * ringWidth);
        // Use first name + last name, or just first name if tight
        const parts = d.data.name.split(' ');
        const firstName = parts[0];
        const lastName = parts[parts.length - 1];
        const shortName = firstName + ' ' + lastName;
        const fullName = d.data.name;

        // Approximate chars that fit (roughly 6px per char)
        const maxChars = Math.floor(availableWidth / 5.5);

        if (fullName.length <= maxChars) return fullName;
        if (shortName.length <= maxChars && parts.length > 2) return shortName;
        if (firstName.length <= maxChars) return firstName;
        return firstName.slice(0, maxChars - 1) + '…';
      });

    // Center label for Ava
    g.append('text')
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'middle')
      .attr('font-family', 'Cormorant Garamond, serif')
      .attr('font-size', '13px')
      .attr('font-weight', '600')
      .attr('fill', '#fff')
      .text(familyData.root.name.split(' ')[0]); // First name only in center

    // Zoom & pan
    const zoom = d3.zoom()
      .scaleExtent([0.5, 3])
      .on('zoom', (event) => g.attr('transform', event.transform));
    svg.call(zoom);
  }

  // ─── CARDS VIEW ───
  function renderCards(filterSide, filterGen) {
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';

    let filtered = [...allMembers];
    if (filterSide && filterSide !== 'all') {
      filtered = filtered.filter(m => m.side === filterSide || m.generation === 0);
    }
    if (filterGen !== undefined && filterGen !== 'all') {
      filtered = filtered.filter(m => m.generation === parseInt(filterGen));
    }

    filtered.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = 'person-card';
      card.style.animationDelay = `${i * 0.06}s`;

      const placeholder = getPlaceholderAvatar(m);
      const photoSrc = m.photo ? 'photos/' + m.photo : placeholder;
      const tagClass = m.side === 'maternal' ? 'maternal' : m.side === 'paternal' ? 'paternal' : '';

      card.innerHTML = `
        <img class="card-photo" src="${photoSrc}" alt="${m.name}" onerror="this.src='${placeholder}'">
        <div class="card-name">${m.name}</div>
        <div class="card-relation">${formatRelation(m.relation)}</div>
        ${tagClass ? `<span class="card-tag ${tagClass}">${m.side}</span>` : ''}
      `;

      card.addEventListener('click', () => openPersonModal(m));
      grid.appendChild(card);
    });

    // Filter button handlers
    setupCardFilters();
  }

  function setupCardFilters() {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.closest('.filter-group').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const side = btn.dataset.filter;
        const gen = document.querySelector('.filter-btn[data-gen].active')?.dataset.gen;
        renderCards(side, gen);
      });
    });

    document.querySelectorAll('.filter-btn[data-gen]').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.closest('.filter-group').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const gen = btn.dataset.gen;
        const side = document.querySelector('.filter-btn[data-filter].active')?.dataset.filter;
        renderCards(side, gen);
      });
    });
  }

  // ─── TIMELINE VIEW ───
  function renderTimeline() {
    const container = document.getElementById('timeline-canvas');

    if (!familyData) return;

    container.innerHTML = '';

    const events = familyData.events || buildEventsFromMembers(allMembers);
    // Filter out events with no valid year
    const validEvents = events.filter(e => e.year && !isNaN(e.year));

    if (validEvents.length === 0) {
      container.innerHTML = '<p style="text-align:center;color:#9a9184;padding:80px 24px;font-style:italic;">Add birth years (e.g. 1962 or 01/05/1962) to your family data to see the timeline.</p>';
      return;
    }

    const minYear = Math.min(...validEvents.map(e => e.year));
    const maxYear = Math.max(...validEvents.map(e => e.year));

    // Group events by decade for section headers
    const decades = {};
    validEvents.forEach(evt => {
      const decade = Math.floor(evt.year / 10) * 10;
      if (!decades[decade]) decades[decade] = [];
      decades[decade].push(evt);
    });

    // Build the timeline as a simple vertical flow — no absolute positioning
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'max-width:600px;margin:0 auto;position:relative;padding:20px 0 40px;';

    // Central line
    const line = document.createElement('div');
    line.style.cssText = `
      position:absolute;
      left:24px;
      top:0;
      bottom:0;
      width:3px;
      background:linear-gradient(180deg, var(--accent), var(--maternal));
      border-radius:2px;
    `;
    wrapper.appendChild(line);

    // Sort decades
    const sortedDecades = Object.keys(decades).map(Number).sort((a, b) => a - b);

    sortedDecades.forEach(decade => {
      // Decade header
      const decadeHeader = document.createElement('div');
      decadeHeader.style.cssText = `
        position:relative;
        padding:16px 0 8px 56px;
        font-family:'JetBrains Mono',monospace;
        font-size:13px;
        font-weight:600;
        color:var(--accent);
        letter-spacing:0.5px;
      `;
      decadeHeader.textContent = decade + 's';

      // Dot on the line
      const decadeDot = document.createElement('div');
      decadeDot.style.cssText = `
        position:absolute;
        left:17px;
        top:18px;
        width:17px;
        height:17px;
        border-radius:50%;
        background:var(--accent);
        border:3px solid var(--bg);
        z-index:2;
      `;
      decadeHeader.appendChild(decadeDot);
      wrapper.appendChild(decadeHeader);

      // Events in this decade
      decades[decade].sort((a, b) => a.year - b.year).forEach(evt => {
        const eventEl = document.createElement('div');
        eventEl.style.cssText = `
          position:relative;
          padding:8px 16px 8px 56px;
          cursor:pointer;
          transition:background 0.15s;
        `;
        eventEl.addEventListener('mouseenter', () => { eventEl.style.background = 'rgba(184,110,58,0.04)'; });
        eventEl.addEventListener('mouseleave', () => { eventEl.style.background = 'transparent'; });

        // Small dot on the line
        const dot = document.createElement('div');
        dot.style.cssText = `
          position:absolute;
          left:20px;
          top:16px;
          width:11px;
          height:11px;
          border-radius:50%;
          border:2.5px solid var(--bg);
          z-index:2;
          background:${evt.type === 'birth' ? 'var(--maternal)' : evt.type === 'death' ? 'var(--text-muted)' : 'var(--accent)'};
        `;
        eventEl.appendChild(dot);

        // Card
        const card = document.createElement('div');
        card.style.cssText = `
          background:var(--bg-card);
          border:1px solid var(--border-light);
          border-radius:var(--radius-sm);
          padding:14px 18px;
          box-shadow:var(--shadow-sm);
          transition:box-shadow 0.2s, transform 0.2s;
        `;
        eventEl.addEventListener('mouseenter', () => { card.style.boxShadow = 'var(--shadow-md)'; card.style.transform = 'translateX(4px)'; });
        eventEl.addEventListener('mouseleave', () => { card.style.boxShadow = 'var(--shadow-sm)'; card.style.transform = 'none'; });

        card.innerHTML = `
          <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:2px;">
            <span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);font-weight:600;">${evt.year}</span>
            <span style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--text);">${evt.person}</span>
          </div>
          <div style="font-size:13px;color:var(--text-muted);">${evt.type === 'birth' ? '🌱 Born' : evt.type === 'death' ? '🕊 Passed away' : evt.type}</div>
        `;

        eventEl.appendChild(card);

        eventEl.addEventListener('click', () => {
          const person = allMembers.find(m => m.id === evt.personId);
          if (person) openPersonModal(person);
        });

        wrapper.appendChild(eventEl);
      });
    });

    container.appendChild(wrapper);
  }

  // ═══ KICK IT OFF ═══
  document.addEventListener('DOMContentLoaded', init);

})();
  </script>
</body>
